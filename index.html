<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorldMonitor Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e1e4e8; height: 100dvh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; max-width: 760px; padding: 18px 20px 14px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.05rem; font-weight: 600; color: #f0f6fc; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
    header .dot.offline { background: #f85149; }
    #chat-window { flex: 1; overflow-y: auto; width: 100%; max-width: 760px; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    .message { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }
    .bubble { padding: 11px 15px; border-radius: 12px; font-size: 0.92rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-width: 88%; }
    .message.user .bubble { background: #1f6feb; color: #fff; border-bottom-right-radius: 3px; }
    .message.assistant .bubble { background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 3px; }
    .sources { font-size: 0.75rem; color: #8b949e; padding: 0 4px; }
    .sources span { display: inline-block; background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 1px 6px; margin: 2px 2px 0 0; }
    .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: #8b949e; border-radius: 50%; margin: 0 2px; animation: blink 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    #input-area { width: 100%; max-width: 760px; padding: 14px 20px 22px; border-top: 1px solid #21262d; }
    #input-row { display: flex; gap: 10px; align-items: flex-end; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 10px 14px; transition: border-color 0.15s; }
    #input-row:focus-within { border-color: #58a6ff; }
    #question { flex: 1; background: transparent; border: none; outline: none; color: #e1e4e8; font-size: 0.93rem; line-height: 1.5; resize: none; max-height: 140px; overflow-y: auto; font-family: inherit; }
    #question::placeholder { color: #484f58; }
    #send-btn { background: #1f6feb; border: none; border-radius: 8px; color: #fff; padding: 7px 14px; font-size: 0.88rem; font-weight: 500; cursor: pointer; flex-shrink: 0; transition: background 0.15s, opacity 0.15s; }
    #send-btn:hover { background: #388bfd; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #clear-btn { display: block; margin: 8px auto 0; background: none; border: none; color: #484f58; font-size: 0.78rem; cursor: pointer; transition: color 0.15s; }
    #clear-btn:hover { color: #8b949e; }
    .empty-state { margin: auto; text-align: center; color: #484f58; }
    .empty-state h2 { font-size: 1.3rem; font-weight: 600; color: #6e7681; margin-bottom: 8px; }
    .empty-state p { font-size: 0.88rem; }
  </style>
</head>
<body>
<header>
  <div class="dot" id="status-dot"></div>
  <h1>WorldMonitor Chatbot</h1>
</header>
<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <h2>Ask anything about WorldMonitor</h2>
    <p>Answers are grounded in the WorldMonitor knowledge base.</p>
  </div>
</div>
<div id="input-area">
  <div id="input-row">
    <textarea id="question" rows="1" placeholder="Ask a question…"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <button id="clear-btn">Clear conversation</button>
</div>
<script src="/static/app.js"></script>
</body>
</html>
