<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WorldMonitor Codebase Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top, #202233 0, #05060a 55%, #010104 100%);
      color: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .app {
      width: 100%;
      max-width: 900px;
      height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #00c853;
      box-shadow: 0 0 10px rgba(0, 200, 83, 0.8);
    }

    .title {
      font-weight: 600;
      font-size: 18px;
    }

    .status-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .chat-window {
      flex: 1;
      border-radius: 16px;
      background: rgba(5,6,12,0.9);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: #1c2440;
    }
    .message.assistant {
      align-self: flex-start;
      background: #13151e;
    }

    .sources {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 6px;
    }

    .persona-selector {
      position: relative;
      font-size: 13px;
      flex-shrink: 0;
    }

    .persona-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      color: #f5f5f5;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      white-space: nowrap;
    }

    .persona-menu {
      position: absolute;
      bottom: 110%; /* dropup above the button */
      left: 0;
      background: #15171c;
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      padding: 4px 0;
      min-width: 200px;
      display: none;
      z-index: 20;
    }

    .persona-option {
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
    }

    .persona-option:hover {
      background: rgba(255,255,255,0.06);
    }

    .input-row textarea {
      flex: 1;
      resize: none;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.7);
      color: #eee;
      padding: 8px 10px;
      min-height: 40px;
      max-height: 80px;
      font-size: 13px;
    }

    .input-row button {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      background: #2962ff;
      color: white;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .input-row button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="status-dot"></div>
      <div class="title">WorldMonitor Codebase Chatbot</div>
      <span class="status-label">Connected</span>
    </header>

    <div id="chat-window" class="chat-window"></div>

    <div class="input-row">
      <div class="persona-selector">
        <button id="profile-toggle" class="persona-btn">
          Profile: <span id="profile-label">Product</span> ▲
        </button>
        <div id="profile-menu" class="persona-menu">
          <div class="persona-option" data-profile="product">Product</div>
          <div class="persona-option" data-profile="tech">Tech / Developer</div>
          <div class="persona-option" data-profile="support">Support</div>
          <div class="persona-option" data-profile="sales">Sales</div>
        </div>
      </div>

      <textarea
        id="question"
        placeholder="Ask something about the worldmonitor GitHub codebase..."
      ></textarea>

      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
